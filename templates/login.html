<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ASD Risk Prediction Tool</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>">
</head>
<body>
    <div class="container login-container">
        <div class="card login-card">
            <header>
                <h1>🧠 ASD Risk Prediction</h1>
                <p>Sign in to access the screening tool</p>
            </header>

            {% if error %}
            <div class="login-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/login" class="login-form">
                <div class="input-container">
                    <label for="name">Your Name <span class="required">*</span></label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required autofocus>
                </div>
                <div class="input-container">
                    <label for="email">Email <span class="optional">(optional)</span></label>
                    <input type="email" id="email" name="email" placeholder="your.email@example.com">
                </div>
                <button type="submit" class="btn-submit">Continue to Screening</button>
            </form>

            <p class="disclaimer">
                Your information is stored locally and used only
                to track screening history within this application.
            </p>
        </div>
    </div>
</body>
</html>
